server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets with caching; HTML always revalidated.
  location ~* \.(js|css|svg|png|woff2?)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
