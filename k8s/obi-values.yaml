preset: "application"
privileged: true
securityContext:
  privileged: true
extraCapabilities:
  - SYS_RESOURCE

tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Mount debugfs/tracefs from host — required for StatsO11y tracepoints
volumes:
  - name: debugfs
    hostPath:
      path: /sys/kernel/debug
      type: DirectoryOrCreate
  - name: tracefs
    hostPath:
      path: /sys/kernel/tracing
      type: DirectoryOrCreate

volumeMounts:
  - name: debugfs
    mountPath: /sys/kernel/debug
  - name: tracefs
    mountPath: /sys/kernel/tracing

config:
  create: true
  data:
    meter_provider:
      features:
        - network
        - stats
        - application

    otel_metrics_export:
      endpoint: "http://otelcol.observability.svc.cluster.local:4317"
      protocol: grpc

    otel_traces_export:
      endpoint: "http://otelcol.observability.svc.cluster.local:4317"
      protocol: grpc

    attributes:
      kubernetes:
        enable: true

    network:
      enable: true
      source: socket_filter
      allowed_attributes:
        - k8s.src.owner.name
        - k8s.dst.owner.name
        - k8s.src.namespace
        - k8s.dst.namespace

    discovery:
      instrument:
        - k8s_namespace: otel-lab
        - k8s_namespace: observability

    filter:
      network:
        k8s_dst_owner_name:
          not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*grafana-agent*}'
        k8s_src_owner_name:
          not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*grafana-agent*}'

    prometheus_export:
      port: 9091
      path: /metrics

env:
  OTEL_EBPF_KUBE_METADATA_ENABLE: "true"
  OTEL_EBPF_METRICS_FEATURES: "network,stats,application"
  OTEL_EBPF_NETWORK_SOURCE: "socket_filter"

dnsPolicy: ClusterFirstWithHostNet
