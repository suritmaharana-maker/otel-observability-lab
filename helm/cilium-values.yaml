# Cilium 1.19.4 Helm values for AWS EKS ENI mode
# Source: cilium.io/blog/2025/06/19/eks-eni-install/
#
# ENI mode: Cilium manages ENIs and IP allocation in place of AWS VPC CNI.
# aws-node DaemonSet is patched with a non-matching nodeSelector before this
# installs - preventing ENI management conflicts.

# Required: EKS API server endpoint (without https://)
# Cilium cannot reach k8s API before networking is initialised without this
# Source: cilium.io/blog/2025/06/19/eks-eni-install/
k8sServiceHost: 99B389CBB5B02A44A96D570AA7358F4E.gr7.us-east-2.eks.amazonaws.com
k8sServicePort: 443

# ENI / IPAM
eni:
  enabled: true

ipam:
  mode: eni

# Native routing - no overlay encapsulation, uses VPC routing directly
routingMode: native

# Required for ENI mode - must be explicit alongside bpf.masquerade
# Source: confirmed from Cilium agent error logs
enableIPv4Masquerade: true

bpf:
  masquerade: true

# Node taint management
# Cilium removes node.cilium.io/agent-not-ready taint automatically
removeNodeTaints: true
setNodeTaints: true

# Kube proxy replacement
# false = safe default for EKS; kube-proxy addon handles service routing
kubeProxyReplacement: false

# Operator
operator:
  replicas: 1
  # Disable aggressive restart of unmanaged pods (e.g. CoreDNS)
  unmanagedPodWatcher:
    restart: false

# Hubble - network observability
# Enabled now so Phase 2 requires no cluster changes
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: false
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
    serviceMonitor:
      enabled: false

# Resources - sized for t3.xlarge nodes (4 vCPU, 16GB RAM)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi