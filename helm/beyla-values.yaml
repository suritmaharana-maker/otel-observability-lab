# Grafana Beyla 3.20.0 — Helm chart 1.16.8
# eBPF L7 autoinstrumentation for otel-lab namespace
# Kernel 6.12.90 — TCX mode — no Cilium conflict
# Source: grafana.com/docs/beyla/latest/cilium-compatibility/

image:
  repository: grafana/beyla
  tag: "3.20.0"
  pullPolicy: IfNotPresent

# DaemonSet — one Beyla per node
daemonset:
  enabled: true

# Required capabilities for eBPF
securityContext:
  privileged: false
  capabilities:
    add:
      - CAP_DAC_READ_SEARCH
      - CAP_SYS_PTRACE
      - CAP_PERFMON
      - CAP_BPF
      - CAP_CHECKPOINT_RESTORE
      - CAP_NET_RAW

# Required host access for eBPF
preset: ""

hostPID: true

tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

config:
  data:
    attributes:
      kubernetes:
        enable: true
        cluster_name: "otel-lab"

    # Instrument only otel-lab namespace
    discovery:
      services:
        - k8s_namespace: "otel-lab"

    # W3C traceparent propagation — correlates with OTel SDK spans
    ebpf:
      enable_context_propagation: true
      traffic_control_backend: tcx

    # OTLP export to our Collector
    otel_traces_export:
      endpoint: "http://otelcol.observability.svc.cluster.local:4317"

    otel_metrics_export:
      endpoint: "http://otelcol.observability.svc.cluster.local:4317"

    # RED metrics — Rate, Errors, Duration per service
    prometheus_export:
      enabled: false

    routes:
      unmatched: heuristic

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi