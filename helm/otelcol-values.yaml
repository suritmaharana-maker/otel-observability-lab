# OTel Collector Contrib v0.154.0
# Phase 1: full pipeline to Dash0
# Deployed as DaemonSet (one per node) in agent mode

mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.154.0"

# RBAC for k8sattributes processor
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "watch", "list"]

extraEnvs:
  - name: DASH0_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: dash0-secret
        key: auth-token

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

    hostmetrics:
      collection_interval: 30s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        network: {}

    filelog:
      include:
        - /var/log/pods/otel-lab_*/*/*.log
      include_file_path: true
      operators:
        - type: json_parser
          timestamp:
            parse_from: attributes.time
            layout: '%Y-%m-%dT%H:%M:%S.%LZ'

  processors:
    # CRITICAL: memory_limiter MUST be first
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

    # Enriches every signal with K8s metadata
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    resource:
      attributes:
        - key: deployment.environment
          value: "lab"
          action: upsert
        - key: cloud.provider
          value: "aws"
          action: upsert
        - key: cloud.region
          value: "us-east-2"
          action: upsert

    batch:
      send_batch_size: 1000
      timeout: 10s

  exporters:
    otlp/dash0:
      endpoint: "ingress.us-west-2.aws.dash0.com:4317"
      headers:
        Authorization: "Bearer ${env:DASH0_AUTH_TOKEN}"

    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/dash0, debug]
      metrics:
        receivers: [otlp, hostmetrics]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/dash0]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlp/dash0]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

