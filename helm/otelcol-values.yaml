# OTel Collector Contrib v0.154.0 Helm values
# Phase 1: minimal stub to verify pipeline works
# Phase 2: full MELT pipeline with Beyla + Hubble + Dash0

mode: daemonset  # agent mode — one per node

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.154.0"

# RBAC for k8sattributes processor
# CRITICAL: Without this, every span arrives with no Kubernetes metadata
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "watch", "list"]

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    # CRITICAL: memory_limiter MUST be first in the processor chain
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

    # Enriches every span/metric/log with K8s metadata
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection

    # Add environment labels to every signal
    resource:
      attributes:
        - key: deployment.environment
          value: "lab"
          action: upsert
        - key: cloud.provider
          value: "aws"
          action: upsert
        - key: cloud.region
          value: "us-east-2"
          action: upsert

    batch:
      send_batch_size: 1000
      timeout: 10s

  exporters:
    # Phase 1: log to stdout to verify pipeline works
    debug:
      verbosity: basic

    # Phase 2+: Dash0 OTLP endpoint (uncomment when Dash0 account is ready)
    # otlp/dash0:
    #   endpoint: "ingress.us-east-2.aws.dash0.com:4317"
    #   headers:
    #     Authorization: "Bearer ${env:DASH0_AUTH_TOKEN}"

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [debug]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
